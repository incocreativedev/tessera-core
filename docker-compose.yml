version: '3.8'

services:
  tessera-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tessera-api
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      LOG_LEVEL: info
    volumes:
      - ./tessera:/app/tessera
      - ./examples:/app/examples
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

