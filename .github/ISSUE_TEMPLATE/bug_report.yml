name: Bug Report
description: Report a bug in tessera-core
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue.
      render: python

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you expected to happen.

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened. Include any error messages or tracebacks.

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.11"

  - type: input
    id: torch-version
    attributes:
      label: PyTorch version
      placeholder: "2.2.0"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 22.04"
